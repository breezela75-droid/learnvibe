<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>하루 긍정 명언</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="app-header">
            <h1>하루 긍정 명언</h1>
            <button id="theme-toggle-btn" class="theme-toggle" type="button" aria-label="다크 모드로 변경">
                <span id="theme-icon" aria-hidden="true">🌙</span>
                <span id="theme-label">다크 모드</span>
            </button>
        </header>
        <div class="quote-card">
            <p id="quote-text">여기에 명언이 표시됩니다.</p>
            <p id="quote-author">- 출처</p>
        </div>
        <button id="new-quote-btn">새 명언 보기</button>
    </div>
    <script src="main.js"></script>
</body>
</html>
